services:
  - type: web
    name: openclaw-phone-studio
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/status
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: INSTAGRAM_APP_ID
        sync: false
      - key: INSTAGRAM_APP_SECRET
        sync: false
      - key: INSTAGRAM_REDIRECT_URI
        sync: false
      - key: INSTAGRAM_API_VERSION
        value: v21.0
      - key: INSTAGRAM_OAUTH_AUTHORIZE_URL
        value: https://www.facebook.com/v21.0/dialog/oauth
      - key: INSTAGRAM_OAUTH_TOKEN_URL
        value: https://graph.facebook.com/v21.0/oauth/access_token
      - key: INSTAGRAM_GRAPH_API_BASE_URL
        value: https://graph.facebook.com/v21.0
      - key: INSTAGRAM_SCOPES
        value: instagram_graph_api,instagram_manage_messages,instagram_basic,pages_manage_posts
      - key: DB_PATH
        value: /var/data/phone_studio.db
      - key: APPROVAL_TOKEN
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PWA_ORIGIN
        value: https://nothinginfinity.github.io/phone-studio
      - key: DM_SYNC_INTERVAL_MINUTES
        value: 5
      - key: POST_RETRY_MAX_ATTEMPTS
        value: 3
